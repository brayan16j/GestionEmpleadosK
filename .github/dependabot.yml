# Dependabot keeps third-party GitHub Actions and npm dependencies fresh.
# Bumps land as PRs once a month (UTC); a green CI run is required to merge.
#
# Why both ecosystems here:
#   - github-actions  → resolves `@v4` tags to a newer SHA when the upstream releases.
#   - npm             → keeps the monorepo lockfile current (Prisma, Fastify, etc).
#
# Scope is intentionally restricted: only patch + minor bumps land automatically.
# Major version bumps still need a human-driven OpenSpec change.

version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore(ci)
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    commit-message:
      prefix: chore(deps)
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    ignore:
      # Major upgrades trigger their own OpenSpec change, not Dependabot.
      - dependency-name: "*"
        update-types: [version-update:semver-major]
