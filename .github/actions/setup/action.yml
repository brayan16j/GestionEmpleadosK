name: Setup Node + pnpm + caches
description: |
  Shared setup for EmployeeK CI jobs. Installs Node from .nvmrc, pnpm from
  package.json#packageManager, and primes the pnpm store + Turbo caches before
  running `pnpm install --frozen-lockfile`. Extracted because 4 of the 5 jobs
  in ci.yml repeat the same steps (criterion: extract when reused >3 times).

runs:
  using: composite
  steps:
    - name: Setup Node from .nvmrc
      uses: actions/setup-node@v4 # Pin to SHA via Dependabot once configured (see ci.yml header)
      with:
        node-version-file: .nvmrc

    - name: Setup pnpm from package.json#packageManager
      uses: pnpm/action-setup@v4
      # No `version:` input on purpose — action reads `packageManager` field.

    - name: Resolve pnpm store path
      id: pnpm-store
      shell: bash
      run: echo "STORE_PATH=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@v4
      with:
        path: ${{ steps.pnpm-store.outputs.STORE_PATH }}
        key: pnpm-store-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-store-${{ runner.os }}-

    - name: Cache Turbo
      uses: actions/cache@v4
      with:
        path: node_modules/.cache/turbo
        key: turbo-${{ runner.os }}-${{ github.sha }}
        restore-keys: |
          turbo-${{ runner.os }}-

    - name: Install dependencies
      shell: bash
      run: pnpm install --frozen-lockfile
